name: Evaluate Draw Result

on:
  schedule:
    # 开奖后抓结果并评估：北京时间 22:30 = UTC 14:30
    - cron: "30 14 * * 1,3,6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch latest draw
        run: python -m backend.src.scraper.fetch_history

      - name: Evaluate predictions
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          WEWORK_WEBHOOK: ${{ secrets.WEWORK_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python -m backend.src.tasks.evaluate

      - name: Export JSON
        run: python -m backend.src.export.to_json

      - name: Commit data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): evaluate latest draw"
          file_pattern: data/**/*.json data/*.db data/lstm_state.pt data/lstm_meta.json

name: Walk-Forward Backtest

# 手动触发：在 N 期历史上做严格 walk-forward，用于填充 methodology 页的统计判决数据
on:
  workflow_dispatch:
    inputs:
      start:
        description: "起始索引（负数 = 倒数 N 期，例如 -500 表示最近 500 期回测）"
        required: true
        default: "-300"
      force:
        description: "是否覆盖已有预测（true/false）"
        required: true
        default: "false"
      models:
        description: "只跑哪些模型（逗号分隔；空 = 仅轻量模型 random/frequency/bayesian/markov/genetic）"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run walk-forward backtest
        env:
          ONLY_MODELS: ${{ inputs.models }}
        run: |
          ARGS="--start ${{ inputs.start }}"
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "$ONLY_MODELS" ]; then ARGS="$ARGS --only $ONLY_MODELS"; fi
          python -m backend.src.tasks.backtest $ARGS

      - name: Export JSON (含 significance.json)
        run: python -m backend.src.export.to_json

      - name: Render charts
        run: python -m backend.src.export.chart

      - name: Commit backtest results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(backtest): walk-forward ${{ inputs.start }} (force=${{ inputs.force }})"
          file_pattern: |
            data/daletou.db
            data/export/*.json
            data/img/*.png

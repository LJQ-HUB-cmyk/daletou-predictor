name: Predict Next Draw

on:
  schedule:
    # 大乐透开奖日：周一/三/六 20:30（北京时间）
    # 这里在开奖前 2 小时生成预测（北京时间 18:00 = UTC 10:00）
    - cron: "0 10 * * 1,3,6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch latest history
        run: python -m backend.src.scraper.fetch_history

      - name: Evaluate previous predictions (in case missed)
        run: python -m backend.src.tasks.evaluate

      - name: Generate new predictions
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          WEWORK_WEBHOOK: ${{ secrets.WEWORK_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python -m backend.src.tasks.predict

      - name: Export JSON for frontend
        run: python -m backend.src.export.to_json

      - name: Commit data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): auto-generate predictions"
          file_pattern: data/**/*.json data/*.db data/lstm_state.pt data/lstm_meta.json

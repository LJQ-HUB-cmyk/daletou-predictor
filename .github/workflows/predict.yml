name: Predict Next Draw

on:
  schedule:
    # 大乐透开奖日：周一/三/六 20:30（北京时间）
    # 在开奖前 2 小时生成预测（北京时间 18:00 = UTC 10:00）
    # GitHub schedule 高峰期可能延迟甚至跳过，排布多个时间点 + predict.py 自带幂等（全已存在不通知）→ 稳；
    # 第一个成功跑通之后，后面几次进来发现 predictions 表已有本期记录会立即 skip，不会重复通知。
    - cron: "0 10 * * 1,3,6"   # 18:00
    - cron: "20 10 * * 1,3,6"  # 18:20
    - cron: "45 10 * * 1,3,6"  # 18:45
    - cron: "15 11 * * 1,3,6"  # 19:15
    - cron: "45 11 * * 1,3,6"  # 19:45
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch latest history
        run: python -m backend.src.scraper.fetch_history

      # --- 1) 先评估上一期（仅入库，不推送） ---
      - name: Evaluate previous predictions (db only)
        id: eval
        run: python -m backend.src.tasks.evaluate --no-notify --print-evaluated-issue

      # --- 2) 生成本期预测（仅入库，不推送） ---
      - name: Generate predictions (db only)
        id: pred
        run: python -m backend.src.tasks.predict --no-notify --print-issue

      # --- 3) 渲染全部图表（包含本期预测汇总 + 上期开奖命中图） ---
      - name: Render charts
        env:
          PREDICT_ISSUE: ${{ steps.pred.outputs.issue }}
          EVAL_ISSUE: ${{ steps.eval.outputs.evaluated_issue }}
        run: |
          ARGS=""
          if [ -n "$PREDICT_ISSUE" ]; then ARGS="$ARGS --predict-issue $PREDICT_ISSUE"; fi
          if [ -n "$EVAL_ISSUE" ]; then ARGS="$ARGS --evaluate-issue $EVAL_ISSUE"; fi
          python -m backend.src.export.chart $ARGS

      # --- 4) 先把图和数据库一起 commit，确保 CDN 可访问 ---
      - name: Commit charts + db (before notify)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update db & charts before notify"
          file_pattern: data/img/*.png data/*.db data/lstm_state.pt data/lstm_meta.json data/transformer_state.pt data/transformer_meta.json data/xgboost_probs.npz

      # --- 5) 等几秒让 raw.githubusercontent CDN 更新 ---
      - name: Wait for CDN
        run: sleep 8

      # --- 6) 推送上期开奖通知 ---
      - name: Notify evaluate (if any)
        if: steps.eval.outputs.evaluated_issue != ''
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          WEWORK_WEBHOOK: ${{ secrets.WEWORK_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python -m backend.src.tasks.evaluate --notify-only --issue ${{ steps.eval.outputs.evaluated_issue }}

      # --- 7) 推送本期预测通知 ---
      - name: Notify predict
        if: steps.pred.outputs.issue != ''
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          WEWORK_WEBHOOK: ${{ secrets.WEWORK_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python -m backend.src.tasks.predict --notify-only --issue ${{ steps.pred.outputs.issue }}

      # --- 8) 导出前端 JSON 并 commit ---
      - name: Export JSON for frontend
        run: python -m backend.src.export.to_json

      - name: Commit JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): export json for frontend"
          file_pattern: data/**/*.json
